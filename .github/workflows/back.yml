name: Backend - Rosario

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Copiar archivos al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/JoinUpRosarioBack"

      - name: Ejecutar comandos en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/JoinUpRosarioBack

            echo "Instalando dependencias..."
            npm install --production

            echo "Reiniciando backend..."
            pm2 delete backend-rosario
            
            pm2 start src/server.js --name backend-rosario

            pm2 save

            echo "Deploy finalizado correctamente"
